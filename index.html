<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      min-height: 100vh;
      color: #393939;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      background: #263244;
      color: white;
      padding: 1.25rem 0;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: #387ed1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
    }

    .logo p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }

    .header-meta {
      text-align: right;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    main.container {
      padding: 2rem 1.5rem 1.5rem;
    }

    .search-box {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.75rem 0.75rem 0.75rem 2.75rem;
      font-size: 0.9rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      background: white;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .search-box input:focus {
      outline: none;
      border-color: #387ed1;
    }

    .search-box .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      width: 18px;
      height: 18px;
    }

    .job-meta i {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .tabs-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .tabs-wrapper.scrolled-end::after {
      opacity: 0;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      -webkit-overflow-scrolling: touch;
    }

    .tabs::-webkit-scrollbar {
      height: 4px;
    }

    .tabs::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .tab {
      padding: 0.5rem 1rem;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
      background: white;
      color: #666;
    }

    .tab:hover {
      border-color: #387ed1;
      color: #387ed1;
    }

    .tab.active {
      background: #387ed1;
      border-color: #387ed1;
      color: white;
    }

    .job-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .job-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 4px;
      padding: 1.1rem 1.25rem;
      transition: all 0.15s;
      border: 1px solid #e0e0e0;
    }

    .job-card:hover {
      border-color: #387ed1;
    }

    .job-card:hover .job-title {
      color: #387ed1;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .job-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #393939;
      line-height: 1.4;
    }

    .job-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
      color: #999;
    }

    .job-meta span {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .stats-bar {
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Company badge colors */
    .badge-sunlife { background: #f5f5f5; color: #d4a017; }
    .badge-agf { background: #f5f5f5; color: #2a6cb6; }
    .badge-fidelity { background: #f5f5f5; color: #2e7d32; }
    .badge-imco { background: #f5f5f5; color: #c67c00; }
    .badge-optrust { background: #f5f5f5; color: #4a5899; }
    .badge-aviva { background: #f5f5f5; color: #d4a017; }
    .badge-blackrock { background: #393939; color: #fff; }
    .badge-canadalife { background: #f5f5f5; color: #2e7d32; }
    .badge-cibcmellon { background: #f5f5f5; color: #c62828; }
    .badge-alterna { background: #f5f5f5; color: #2a6cb6; }
    .badge-meridian { background: #f5f5f5; color: #00695c; }
    .badge-cooperators { background: #f5f5f5; color: #2e7d32; }
    .badge-igm { background: #f5f5f5; color: #5c35a3; }
    .badge-statestreet { background: #f5f5f5; color: #1a3c6e; }
    .badge-raymondjames { background: #f5f5f5; color: #1a5c2e; }
    .badge-mackenzie { background: #f5f5f5; color: #c44e00; }
    .badge-richardson { background: #f5f5f5; color: #1a3c6e; }
    .badge-iawealth { background: #f5f5f5; color: #2a6cb6; }

    .error-banner {
      padding: 0.65rem 0;
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      font-size: 0.8rem;
      color: #8d6e00;
      display: none;
    }

    .error-banner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .error-banner-header span {
      font-weight: 600;
    }

    .error-banner-toggle {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: #8d6e00;
      transition: transform 0.2s;
    }

    .error-banner-toggle.expanded {
      transform: rotate(180deg);
    }

    .error-banner-details {
      display: none;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid #ffe082;
    }

    .error-banner-details ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    @media (max-width: 640px) {
      .container { padding: 0 1rem; }
      main.container { padding-top: 1.5rem; }
      .logo-icon { width: 32px; height: 32px; }
      .logo h1 { font-size: 1.05rem; }
      .logo p { font-size: 0.7rem; }
      .header-meta { font-size: 0.65rem; }
      .job-header { flex-direction: column; gap: 0.5rem; }
      .job-badge { align-self: flex-start; }
      .tabs-wrapper::after {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 40px;
        background: linear-gradient(to right, transparent, #fafafa);
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tabs { scrollbar-width: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo">
        <div class="logo-icon"><i data-lucide="briefcase" style="width:20px;height:20px;color:white"></i></div>
        <div>
          <h1>Jobber</h1>
          <p id="stats">Loading jobs...</p>
        </div>
      </div>
      <div class="header-meta" id="updated"></div>
    </div>
  </header>

  <div class="error-banner" id="error-banner">
    <div class="container">
      <div class="error-banner-header" onclick="toggleErrors()">
        <span id="error-summary"></span>
        <button class="error-banner-toggle" id="error-toggle"><i data-lucide="chevron-down" style="width:16px;height:16px"></i></button>
      </div>
      <div class="error-banner-details" id="error-details"></div>
    </div>
  </div>

  <main class="container">
    <div class="search-box">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="search" placeholder="Search by title, location, or company...">
    </div>

    <div class="tabs-wrapper" id="tabs-wrapper">
      <div class="tabs" id="tabs"></div>
    </div>
    <div class="job-list" id="jobs"></div>
    <div class="stats-bar" id="footer-stats"></div>
  </main>

  <script>
    let data = null;
    let activeTab = 'all';
    let searchQuery = '';

    const badgeClasses = {
      sunlife: 'badge-sunlife',
      agf: 'badge-agf', 
      fidelity: 'badge-fidelity',
      imco: 'badge-imco',
      optrust: 'badge-optrust',
      aviva: 'badge-aviva',
      blackrock: 'badge-blackrock',
      canadalife: 'badge-canadalife',
      cibcmellon: 'badge-cibcmellon',
      alterna: 'badge-alterna',
      meridian: 'badge-meridian',
      cooperators: 'badge-cooperators',
      igm: 'badge-igm',
statestreet: 'badge-statestreet',
      raymondjames: 'badge-raymondjames',
      mackenzie: 'badge-mackenzie',
      richardson: 'badge-richardson',
      iawealth: 'badge-iawealth'
    };

    async function loadJobs() {
      try {
        const res = await fetch('jobs.json');
        data = await res.json();
        
        const total = data.sources.reduce((a,s) => a + s.jobCount, 0);
        document.getElementById('stats').textContent = `${total} jobs from ${data.sources.length} companies`;
        
        const updated = new Date(data.lastUpdated);
        document.getElementById('updated').innerHTML = `Last updated<br>${updated.toLocaleDateString()} ${updated.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        
        renderErrors();
        renderTabs();
        renderJobs();
      } catch (e) {
        document.getElementById('jobs').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i data-lucide="alert-triangle"></i></div>
            <p>Could not load jobs. Make sure jobs.json exists.</p>
          </div>`;
      }
    }

    function renderTabs() {
      const total = data.sources.reduce((a,s) => a + s.jobCount, 0);
      let html = `<button class="tab ${activeTab === 'all' ? 'active' : ''}" onclick="setTab('all')">All Jobs (${total})</button>`;
      
      data.sources.forEach(s => {
        html += `<button class="tab ${activeTab === s.id ? 'active' : ''}" onclick="setTab('${s.id}')">${s.name} (${s.jobCount})</button>`;
      });
      
      document.getElementById('tabs').innerHTML = html;
    }

    function setTab(tab) {
      activeTab = tab;
      renderTabs();
      renderJobs();
      lucide.createIcons();
    }

    function parsePostedDate(s) {
      if (!s) return 0;
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T00:00:00').getTime();
      if (/posted today/i.test(s)) return new Date(data.lastUpdated).getTime();
      const daysMatch = s.match(/posted (\d+)\+? days? ago/i);
      if (daysMatch) return new Date(data.lastUpdated).getTime() - parseInt(daysMatch[1]) * 86400000;
      const parsed = new Date(s);
      if (!isNaN(parsed)) return parsed.getTime();
      return 0;
    }

    function renderJobs() {
      let jobs = [];
      
      if (activeTab === 'all') {
        data.sources.forEach(s => {
          s.jobs.forEach(j => jobs.push({...j, company: s.name, companyId: s.id}));
        });
      } else {
        const source = data.sources.find(s => s.id === activeTab);
        if (source) jobs = source.jobs.map(j => ({...j, company: source.name, companyId: source.id}));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        jobs = jobs.filter(j =>
          j.title.toLowerCase().includes(q) ||
          j.location.toLowerCase().includes(q) ||
          j.company.toLowerCase().includes(q)
        );
      }

      jobs.sort((a, b) => parsePostedDate(b.postedDate) - parsePostedDate(a.postedDate));

      document.getElementById('footer-stats').textContent = `Showing ${jobs.length} job${jobs.length !== 1 ? 's' : ''}`;

      if (jobs.length === 0) {
        document.getElementById('jobs').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i data-lucide="search-x"></i></div>
            <p>No jobs found matching your search</p>
          </div>`;
        return;
      }

      document.getElementById('jobs').innerHTML = jobs.map(j => `
        <a href="${j.url}" target="_blank" rel="noopener" class="job-card">
          <div class="job-header">
            <span class="job-title">${j.title}</span>
            <span class="job-badge ${badgeClasses[j.companyId] || ''}">${j.company}</span>
          </div>
          <div class="job-meta">
            <span><i data-lucide="clock"></i> ${j.postedDate}</span>
            <span><i data-lucide="map-pin"></i> ${j.location}</span>
            <span><i data-lucide="tag"></i> ${j.department}</span>
          </div>
        </a>
      `).join('');
    }

    function renderErrors() {
      const errors = data.sources.filter(s => s.error);
      if (errors.length === 0) return;
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('error-summary').textContent = `${errors.length} source${errors.length > 1 ? 's' : ''} failed to fetch`;
      document.getElementById('error-details').innerHTML = '<ul>' + errors.map(s =>
        `<li><strong>${s.name}:</strong> ${s.error}</li>`
      ).join('') + '</ul>';
    }

    function toggleErrors() {
      const details = document.getElementById('error-details');
      const toggle = document.getElementById('error-toggle');
      const open = details.style.display === 'block';
      details.style.display = open ? 'none' : 'block';
      toggle.classList.toggle('expanded', !open);
    }

    document.getElementById('search').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderJobs();
      lucide.createIcons();
    });

    document.getElementById('tabs').addEventListener('scroll', function() {
      const el = this;
      const atEnd = el.scrollLeft + el.clientWidth >= el.scrollWidth - 10;
      el.parentElement.classList.toggle('scrolled-end', atEnd);
    });

    loadJobs().then(() => lucide.createIcons());
    lucide.createIcons();
  </script>
</body>
</html>
